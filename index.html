<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhonePe Clone</title>
    <link rel="stylesheet" href="phonepay.css">
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 1. HOME SCREEN -->
        <div id="home-screen">
            <div class="top-nav">
                <div class="profile-row"><div class="user-avatar">P</div><div class="loc-text">Add Address <i class="ri-arrow-down-s-line"></i></div></div>
                <div class="top-actions"><i class="ri-qr-code-line"></i><i class="ri-notification-3-line"></i><i class="ri-question-line"></i></div>
            </div>
            <div class="main-content">
                <div class="section-card">
                    <div class="section-header"><h3>Transfer Money</h3></div>
                    <div class="grid-4">
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-smartphone-line"></i></div><span>To Mobile Number</span></div>
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-bank-line"></i></div><span>To Bank/UPI ID</span></div>
                        <div class="grid-item" onclick="alert('Wallet Balance: ₹0.00')"><div class="icon-circle purple-bg"><i class="ri-wallet-3-line"></i></div><span>PhonePe Wallet</span></div>
                        <div class="grid-item" onclick="showScreen('balance-flow')"><div class="icon-circle purple-bg"><i class="ri-bank-card-line"></i></div><span>Check Balance</span></div>
                    </div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-btn active"><i class="ri-home-5-line"></i><span>Home</span></div>
                <div class="nav-btn"><i class="ri-search-line"></i><span>Search</span></div>
                <div class="qr-btn-container"><div class="qr-main-btn"><i class="ri-qr-scan-2-line"></i></div></div>
                <div class="nav-btn"><i class="ri-notification-3-line"></i><span>Alerts</span></div>
                <div class="nav-btn" onclick="alert('No History Yet')"><i class="ri-history-line"></i><span>History</span></div>
            </div>
        </div>

        <!-- 2. TRANSFER SCREEN (Amount Entry) -->
        <div id="transfer-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Send Money</span></div>
            <div class="pay-container">
                <p style="color: #9e9e9e; text-align: center;">Enter Amount</p>
                <div class="amount-input" style="display: flex; align-items: center; justify-content: center; gap: 10px; margin: 30px 0;">
                    <span style="font-size: 30px;">₹</span>
                    <input type="number" id="payAmount" placeholder="0" style="background:transparent; border:none; border-bottom:2px solid #6739b7; color:white; font-size:40px; width:150px; text-align:center; outline:none;">
                </div>
                <button class="pay-btn" onclick="startPaymentFlow()" style="width: 100%; background: #6739b7; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">PROCEED TO PAY</button>
            </div>
        </div>

        <!-- 3. UPI PIN SCREEN -->
        <div id="pin-screen" class="full-screen" style="background: #111;">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>ENTER UPI PIN</span></div>
            <div class="upi-pin-container" style="text-align: center; margin-top: 40px;">
                <p id="pin-label" style="color: #9e9e9e; margin-bottom: 5px;">IDFC FIRST BANK - 8899</p>
                <div class="pin-dots" style="display: flex; justify-content: center; gap: 20px; margin: 40px 0;">
                    <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div>
                    <div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div>
                </div>
                <div class="keypad">
                    <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
                    <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
                    <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
                    <div class="key" onclick="pressKey('X')">⌫</div><div class="key" onclick="pressKey(0)">0</div><div class="key" style="background:#4caf50;" onclick="verifyPin()">✓</div>
                </div>
            </div>
        </div>

        <!-- 4. BALANCE SCREEN -->
        <div id="balance-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Bank Balance</span></div>
            <div class="balance-card" style="background: #1a1a1a; padding: 40px 20px; border-radius: 15px; text-align: center; border: 1px solid #333; margin-top: 20px;">
                <img src="https://idfcfirstbank.com" style="width: 120px; background: white; padding: 5px; border-radius: 5px; margin-bottom: 15px;">
                <p style="color:#9e9e9e">IDFC FIRST BANK - 8899</p>
                <h2 style="font-size: 32px; margin: 20px 0;">₹ 5,00,00,000.00</h2>
                <button class="done-btn" onclick="goHome()" style="width: 100%; background: #6739b7; color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer;">DONE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
