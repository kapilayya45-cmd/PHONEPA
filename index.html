<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhonePe Clone</title>
    <link rel="stylesheet" href="phonepay.css">
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <i class="ri-menu-2-line"></i>
            <div id="pay">PhonePe</div>
            <i class="ri-question-line"></i>
        </div>

        <!-- Money Box -->
        <div id="money-box">
            <div id="profile"><span id="letter">P</span></div>
            <div id="merchantName">Paying to Friend</div>
            <div id="bankingName">Banking Name: Your Friend</div>
            
            <span id="rupeeSymbol">₹</span>
            <input type="number" id="enterAmount" placeholder="Enter Amount">
            
            <input type="text" id="optMsg" placeholder="Add a message (Optional)">
        </div>

        <!-- Pay Button -->
        <div id="proceedToPay" onclick="startPayment()">
            <div id="proceedText">PROCEED TO PAY</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
