<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhonePe</title>
    <link rel="stylesheet" href="phonepay.css">
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Main Home Screen -->
        <div id="home-screen">
            <div class="top-nav">
                <div class="profile-row">
                    <div class="user-avatar">P</div>
                    <div class="loc-text">Add Address <i class="ri-arrow-down-s-line"></i></div>
                </div>
                <div class="top-actions">
                    <i class="ri-qr-code-line"></i>
                    <i class="ri-notification-3-line"></i>
                    <i class="ri-question-line"></i>
                </div>
            </div>

            <div class="main-content">
                <!-- Money Transfer Grid -->
                <div class="section-card">
                    <div class="section-header"><h3>Transfer Money</h3></div>
                    <div class="grid-4">
                        <div class="grid-item" onclick="showScreen('transfer')">
                            <div class="icon-circle purple-bg"><i class="ri-smartphone-line"></i></div>
                            <span>To Mobile Number</span>
                        </div>
                        <div class="grid-item" onclick="showScreen('transfer')">
                            <div class="icon-circle purple-bg"><i class="ri-bank-line"></i></div>
                            <span>To Bank/UPI ID</span>
                        </div>
                        <div class="grid-item" onclick="showScreen('wallet')">
                            <div class="icon-circle purple-bg"><i class="ri-wallet-3-line"></i></div>
                            <span>PhonePe Wallet</span>
                        </div>
                        <div class="grid-item" onclick="showScreen('balance')">
                            <div class="icon-circle purple-bg"><i class="ri-bank-card-line"></i></div>
                            <span>Check Balance</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="bottom-nav">
                <div class="nav-btn active"><i class="ri-home-5-line"></i><span>Home</span></div>
                <div class="nav-btn"><i class="ri-search-line"></i><span>Search</span></div>
                <div class="qr-btn-container"><div class="qr-main-btn"><i class="ri-qr-scan-2-line"></i></div></div>
                <div class="nav-btn"><i class="ri-notification-3-line"></i><span>Alerts</span></div>
                <div class="nav-btn"><i class="ri-history-line"></i><span>History</span></div>
            </div>
        </div>

        <!-- Transfer Screen (Hidden) -->
        <div id="transfer-screen" class="full-screen" style="display:none;">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> Send Money</div>
            <div class="pay-container">
                <p style="color: #9e9e9e;">Enter Amount</p>
                <div class="amount-input">
                    <span>₹</span>
                    <input type="number" id="payAmount" placeholder="0">
                </div>
                <button class="pay-btn" onclick="executePayment()">PROCEED TO PAY</button>
            </div>
        </div>

        <!-- Balance Screen (Hidden) -->
        <div id="balance-screen" class="full-screen" style="display:none;">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> Bank Balance</div>
            <div class="balance-card">
                <p>State Bank of India - 4455</p>
                <h2 id="current-bal">₹ 24,500.50</h2>
                <button class="done-btn" onclick="goHome()">DONE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
