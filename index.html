<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhonePe Clone</title>
    <link rel="stylesheet" href="phonepay.css">
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- HOME SCREEN -->
        <div id="home-screen">
            <div class="top-nav">
                <div class="profile-row"><div class="user-avatar">P</div><div class="loc-text">Add Address <i class="ri-arrow-down-s-line"></i></div></div>
                <div class="top-actions"><i class="ri-qr-code-line"></i><i class="ri-notification-3-line"></i><i class="ri-question-line"></i></div>
            </div>
            <div class="main-content">
                <div class="section-card">
                    <div class="section-header"><h3>Transfer Money</h3></div>
                    <div class="grid-4">
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-smartphone-line"></i></div><span>To Mobile Number</span></div>
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-bank-line"></i></div><span>To Bank/UPI ID</span></div>
                        <div class="grid-item" onclick="alert('Wallet Balance: ₹0.00')"><div class="icon-circle purple-bg"><i class="ri-wallet-3-line"></i></div><span>PhonePe Wallet</span></div>
                        <div class="grid-item" onclick="showScreen('balance')"><div class="icon-circle purple-bg"><i class="ri-bank-card-line"></i></div><span>Check Balance</span></div>
                    </div>
                </div>
            </div>
            <div class="bottom-nav">
                <div class="nav-btn active"><i class="ri-home-5-line"></i><span>Home</span></div>
                <div class="nav-btn"><i class="ri-search-line"></i><span>Search</span></div>
                <div class="qr-btn-container"><div class="qr-main-btn"><i class="ri-qr-scan-2-line"></i></div></div>
                <div class="nav-btn"><i class="ri-notification-3-line"></i><span>Alerts</span></div>
                <div class="nav-btn"><i class="ri-history-line"></i><span>History</span></div>
            </div>
        </div>

        <!-- TRANSFER SCREEN -->
        <div id="transfer-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Send Money</span></div>
            <div class="pay-container">
                <p style="color: #9e9e9e;">Enter Amount</p>
                <div class="amount-input">
                    <span>₹</span><input type="number" id="payAmount" placeholder="0">
                </div>
                <button class="pay-btn" onclick="showScreen('pin')">PROCEED TO PAY</button>
            </div>
        </div>

        <!-- UPI PIN SCREEN -->
        <div id="pin-screen" class="full-screen" style="background: #111;">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="showScreen('transfer')"></i> <span>ENTER UPI PIN</span></div>
            <div class="upi-pin-container">
                <p style="color: #9e9e9e; margin-bottom: 5px;">IDFC FIRST BANK - 8899</p>
                <div class="pin-dots">
                    <div class="dot" id="dot-1"></div><div class="dot" id="dot-2"></div>
                    <div class="dot" id="dot-3"></div><div class="dot" id="dot-4"></div>
                </div>
                <div class="keypad">
                    <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
                    <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
                    <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
                    <div class="key" onclick="pressKey('X')">⌫</div><div class="key" onclick="pressKey(0)">0</div><div class="key" style="background:#4caf50;" onclick="verifyPin()">✓</div>
                </div>
            </div>
        </div>

        <!-- BALANCE SCREEN -->
        <div id="balance-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Bank Balance</span></div>
            <div class="balance-card">
                <img src="https://idfcfirstbank.com" class="bank-logo-img">
                <p style="color:#9e9e9e">IDFC FIRST BANK - 8899</p>
                <h2 class="balance-amt">₹ 5,00,00,000.00</h2>
                <button class="done-btn" onclick="goHome()">DONE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
