<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhonePe - IDFC First Bank</title>
    <link rel="stylesheet" href="phonepay.css">
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        .bank-logo-img { width: 50px; height: 50px; object-fit: contain; background: white; border-radius: 8px; margin-bottom: 10px; }
        .balance-amt { font-size: 36px; color: #ffffff; font-weight: bold; margin: 15px 0; }
        .full-screen { position: absolute; top: 0; width: 100%; height: 100%; background: #000; z-index: 200; padding: 20px; display: none; }
        
        /* UPI PIN Page Styling */
        .upi-pin-container { text-align: center; margin-top: 40px; }
        .pin-dots { display: flex; justify-content: center; gap: 20px; margin: 40px 0; }
        .dot { width: 15px; height: 15px; border-radius: 50%; border: 2px solid #6739b7; }
        .dot.filled { background: white; border-color: white; }
        
        /* Keypad Styling */
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 50px; position: fixed; bottom: 50px; width: 90%; left: 5%; }
        .key { font-size: 24px; color: white; padding: 20px; background: #1a1a1a; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 1. MAIN HOME SCREEN -->
        <div id="home-screen">
            <div class="top-nav">
                <div class="profile-row"><div class="user-avatar">P</div><div class="loc-text">Add Address</div></div>
                <div class="top-actions"><i class="ri-qr-code-line"></i><i class="ri-notification-3-line"></i><i class="ri-question-line"></i></div>
            </div>
            <div class="main-content">
                <div class="section-card">
                    <h3>Transfer Money</h3>
                    <div class="grid-4">
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-smartphone-line"></i></div><span>To Mobile</span></div>
                        <div class="grid-item" onclick="showScreen('transfer')"><div class="icon-circle purple-bg"><i class="ri-bank-line"></i></div><span>To Bank</span></div>
                        <div class="grid-item" onclick="showScreen('wallet')"><div class="icon-circle purple-bg"><i class="ri-wallet-3-line"></i></div><span>Wallet</span></div>
                        <div class="grid-item" onclick="showScreen('balance')"><div class="icon-circle purple-bg"><i class="ri-bank-card-line"></i></div><span>Check Balance</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. TRANSFER SCREEN -->
        <div id="transfer-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Send Money</span></div>
            <div class="pay-container" style="text-align: center;">
                <p style="color: #9e9e9e;">Enter Amount</p>
                <div class="amount-input" style="margin: 30px 0;">
                    <span style="font-size: 30px;">₹</span>
                    <input type="number" id="payAmount" placeholder="0" style="background:transparent; border:none; border-bottom:2px solid #6739b7; color:white; font-size:40px; width:180px; text-align:center; outline:none;">
                </div>
                <button class="pay-btn" onclick="showScreen('pin')" style="width:100%; background:#6739b7; color:white; padding:15px; border-radius:10px; font-weight:bold;">PROCEED TO PAY</button>
            </div>
        </div>

        <!-- 3. UPI PIN SCREEN -->
        <div id="pin-screen" class="full-screen" style="background: #111;">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="showScreen('transfer')"></i> <span>ENTER UPI PIN</span></div>
            <div class="upi-pin-container">
                <p>IDFC FIRST BANK - 8899</p>
                <div class="pin-dots">
                    <div class="dot" id="dot-1"></div>
                    <div class="dot" id="dot-2"></div>
                    <div class="dot" id="dot-3"></div>
                    <div class="dot" id="dot-4"></div>
                </div>
                <div class="keypad">
                    <div class="key" onclick="pressKey(1)">1</div><div class="key" onclick="pressKey(2)">2</div><div class="key" onclick="pressKey(3)">3</div>
                    <div class="key" onclick="pressKey(4)">4</div><div class="key" onclick="pressKey(5)">5</div><div class="key" onclick="pressKey(6)">6</div>
                    <div class="key" onclick="pressKey(7)">7</div><div class="key" onclick="pressKey(8)">8</div><div class="key" onclick="pressKey(9)">9</div>
                    <div class="key" onclick="pressKey('X')">⌫</div><div class="key" onclick="pressKey(0)">0</div><div class="key" style="background:#4caf50;" onclick="verifyPin()">✓</div>
                </div>
            </div>
        </div>

        <!-- 4. BALANCE SCREEN -->
        <div id="balance-screen" class="full-screen">
            <div class="sub-header"><i class="ri-arrow-left-line" onclick="goHome()"></i> <span>Bank Balance</span></div>
            <div class="balance-card" style="background:#1a1a1a; padding:40px 20px; border-radius:15px; text-align:center;">
                <img src="https://idfcfirstbank.com" class="bank-logo-img">
                <h2 class="balance-amt">₹ 5,00,00,000.00</h2>
                <button class="done-btn" onclick="goHome()" style="width:100%; background:#6739b7; color:white; padding:15px; border-radius:10px;">DONE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
