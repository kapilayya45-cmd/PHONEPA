<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0E051A; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #5f259f; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div style="text-align: center;">
        <div class="loader"></div>
        <p style="margin-top: 20px;">Processing Payment...</p>
    </div>
    <script>
        setTimeout(() => { window.location.href = "screen3.html"; }, 2000);
    </script>
</body>
</html>
