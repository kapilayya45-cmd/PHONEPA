<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; }
        
        .container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        /* Success Animation Area */
        .success-header {
            background-color: #ffffff;
            padding-top: 60px;
            padding-bottom: 20px;
        }

        .tick-icon {
            font-size: 100px;
            color: #228B22; /* Success Green */
            display: block;
            margin-bottom: 10px;
        }

        .success-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        /* Bank Card Section */
        .bank-details-card {
            background: #f8f9fa;
            margin: 20px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #eee;
            display: flex;
            align-items: center;
            gap: 15px;
            text-align: left;
        }

        .bank-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: white;
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ddd;
        }

        .bank-info p {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }

        .bank-info span {
            font-size: 12px;
            color: #666;
        }

        .txn-id {
            margin-top: 30px;
            font-size: 13px;
            color: #888;
        }

        /* Done Button */
        .done-btn {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            background-color: #6739b7;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(103, 57, 183, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-header">
            <i class="ri-checkbox-circle-fill tick-icon"></i>
            <p class="success-text">Payment Successful</p>
        </div>

        <!-- IDFC First Bank Details -->
        <div class="bank-details-card">
            <img src="https://idfcfirstbank.com" alt="IDFC Logo" class="bank-logo">
            <div class="bank-info">
                <p>IDFC FIRST BANK</p>
                <span>Debited from A/c XX8899</span>
            </div>
            <div style="margin-left: auto; font-weight: bold; color: #333;">
                <i class="ri-check-double-line" style="color: #228B22;"></i>
            </div>
        </div>

        <div class="txn-id">
            <p>Transaction ID: T24042211559874</p>
            <p style="margin-top: 5px; font-size: 11px;">16:34 PM, 22 April 2024</p>
        </div>

        <button class="done-btn" onclick="window.location.href='index.html'">DONE</button>
    </div>

    <script>
        // Screen load avvagane sound play avvadaniki (if not played in previous screen)
        window.onload = function() {
            console.log("Payment Success Screen Loaded");
        };
    </script>
</body>
</html>
